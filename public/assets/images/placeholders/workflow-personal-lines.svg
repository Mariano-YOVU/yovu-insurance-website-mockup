<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" width="1000" height="300">
  <defs>
    <filter id="wfShadow" x="-3%" y="-5%" width="106%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0a2847" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="wfGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef6fb"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1000" height="300" rx="12" fill="#eef6fb"/>

  <!-- Title -->
  <text x="500" y="36" font-family="Inter,sans-serif" font-size="14" font-weight="700" fill="#0a2847" text-anchor="middle">Personal Lines Workflow</text>

  <!-- Step 1 -->
  <rect x="30" y="65" width="200" height="160" rx="14" fill="url(#wfGrad1)" filter="url(#wfShadow)"/>
  <rect x="30" y="65" width="200" height="6" rx="3" fill="#2d9fd9"/>
  <circle cx="130" cy="120" r="26" fill="#d4ecf7"/>
  <text x="120" y="126" font-family="Inter,sans-serif" font-size="20" fill="#2d9fd9">📞</text>
  <text x="130" y="164" font-family="Inter,sans-serif" font-size="13" font-weight="600" fill="#0a2847" text-anchor="middle">New Business Call</text>
  <text x="130" y="182" font-family="Inter,sans-serif" font-size="10" fill="#3b5068" text-anchor="middle">Inbound call arrives via</text>
  <text x="130" y="196" font-family="Inter,sans-serif" font-size="10" fill="#3b5068" text-anchor="middle">YOVU phone system</text>
  <rect x="95" y="208" width="70" height="4" rx="2" fill="#d4ecf7"/>

  <!-- Arrow 1→2 -->
  <line x1="234" y1="145" x2="268" y2="145" stroke="#2d9fd9" stroke-width="2"/>
  <polygon points="268,139 282,145 268,151" fill="#2d9fd9"/>

  <!-- Step 2 -->
  <rect x="285" y="65" width="200" height="160" rx="14" fill="url(#wfGrad1)" filter="url(#wfShadow)"/>
  <rect x="285" y="65" width="200" height="6" rx="3" fill="#1a6aad"/>
  <circle cx="385" cy="120" r="26" fill="#d4ecf7"/>
  <text x="374" y="126" font-family="Inter,sans-serif" font-size="18" fill="#1a6aad">👤</text>
  <text x="385" y="164" font-family="Inter,sans-serif" font-size="13" font-weight="600" fill="#0a2847" text-anchor="middle">Client Context</text>
  <text x="385" y="182" font-family="Inter,sans-serif" font-size="10" fill="#3b5068" text-anchor="middle">Screen pop shows client</text>
  <text x="385" y="196" font-family="Inter,sans-serif" font-size="10" fill="#3b5068" text-anchor="middle">info and policy details</text>
  <rect x="338" y="200" width="94" height="18" rx="9" fill="#d4ecf7"/>
  <text x="352" y="213" font-family="Inter,sans-serif" font-size="9" font-weight="600" fill="#1a6aad">Screen Pop</text>

  <!-- Arrow 2→3 -->
  <line x1="489" y1="145" x2="523" y2="145" stroke="#2d9fd9" stroke-width="2"/>
  <polygon points="523,139 537,145 523,151" fill="#2d9fd9"/>

  <!-- Step 3 -->
  <rect x="540" y="65" width="200" height="160" rx="14" fill="url(#wfGrad1)" filter="url(#wfShadow)"/>
  <rect x="540" y="65" width="200" height="6" rx="3" fill="#2d9fd9"/>
  <circle cx="640" cy="120" r="26" fill="#d4ecf7"/>
  <text x="629" y="126" font-family="Inter,sans-serif" font-size="18" fill="#2d9fd9">📋</text>
  <text x="640" y="164" font-family="Inter,sans-serif" font-size="13" font-weight="600" fill="#0a2847" text-anchor="middle">Quote &amp; Servicing</text>
  <text x="640" y="182" font-family="Inter,sans-serif" font-size="10" fill="#3b5068" text-anchor="middle">Handle request with full</text>
  <text x="640" y="196" font-family="Inter,sans-serif" font-size="10" fill="#3b5068" text-anchor="middle">context in one window</text>
  <rect x="595" y="208" width="90" height="4" rx="2" fill="#d4ecf7"/>

  <!-- Arrow 3→4 -->
  <line x1="744" y1="145" x2="778" y2="145" stroke="#2d9fd9" stroke-width="2"/>
  <polygon points="778,139 792,145 778,151" fill="#2d9fd9"/>

  <!-- Step 4 -->
  <rect x="795" y="65" width="175" height="160" rx="14" fill="url(#wfGrad1)" filter="url(#wfShadow)"/>
  <rect x="795" y="65" width="175" height="6" rx="3" fill="#0a2847"/>
  <circle cx="882" cy="120" r="26" fill="#d4ecf7"/>
  <text x="872" y="126" font-family="Inter,sans-serif" font-size="18" fill="#0a2847">🔄</text>
  <text x="882" y="164" font-family="Inter,sans-serif" font-size="13" font-weight="600" fill="#0a2847" text-anchor="middle">Renewal Follow-up</text>
  <text x="882" y="182" font-family="Inter,sans-serif" font-size="10" fill="#3b5068" text-anchor="middle">Auto-logged activity,</text>
  <text x="882" y="196" font-family="Inter,sans-serif" font-size="10" fill="#3b5068" text-anchor="middle">ready for next touch</text>
  <rect x="852" y="200" width="62" height="18" rx="9" fill="#d4ecf7"/>
  <text x="859" y="213" font-family="Inter,sans-serif" font-size="9" font-weight="600" fill="#1a6aad">✓ Logged</text>

  <!-- Step numbers -->
  <circle cx="42" cy="79" r="10" fill="#2d9fd9"/>
  <text x="39" y="83" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#ffffff">1</text>
  <circle cx="297" cy="79" r="10" fill="#1a6aad"/>
  <text x="294" y="83" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#ffffff">2</text>
  <circle cx="552" cy="79" r="10" fill="#2d9fd9"/>
  <text x="549" y="83" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#ffffff">3</text>
  <circle cx="807" cy="79" r="10" fill="#0a2847"/>
  <text x="804" y="83" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#ffffff">4</text>

  <!-- Bottom label -->
  <text x="500" y="280" font-family="Inter,sans-serif" font-size="10" fill="#3b5068" text-anchor="middle">Every step powered by YOVU — from first ring to logged activity</text>
</svg>