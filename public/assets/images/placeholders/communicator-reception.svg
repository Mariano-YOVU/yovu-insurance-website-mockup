<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <filter id="rShadow" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0a2847" flood-opacity="0.16"/>
    </filter>
    <filter id="rCardShadow" x="-3%" y="-5%" width="106%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#0a2847" flood-opacity="0.1"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="900" height="500" fill="#eef6fb"/>

  <!-- Main panel -->
  <rect x="20" y="15" width="860" height="470" rx="14" fill="#ffffff" filter="url(#rShadow)"/>
  <!-- Header bar -->
  <rect x="20" y="15" width="860" height="50" rx="14" fill="#2d9fd9"/>
  <rect x="20" y="51" width="860" height="14" fill="#2d9fd9"/>
  <text x="50" y="47" font-family="Inter,sans-serif" font-size="15" font-weight="700" fill="#ffffff">YOVU Communicator — Reception View</text>
  <circle cx="846" cy="40" r="4" fill="#27c93f"/>
  <text x="810" y="44" font-family="Inter,sans-serif" font-size="10" fill="#d4ecf7">Online</text>

  <!-- === LEFT COLUMN: Incoming Queue === -->
  <text x="42" y="90" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#0a2847">Incoming Queue</text>
  <rect x="38" y="96" width="2" height="360" rx="1" fill="#d4ecf7"/>

  <!-- Queue item 1 — ringing -->
  <rect x="52" y="100" width="230" height="70" rx="10" fill="#eef6fb" filter="url(#rCardShadow)" stroke="#2d9fd9" stroke-width="1.5"/>
  <circle cx="74" cy="128" r="6" fill="#2d9fd9">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <text x="88" y="124" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#0a2847">David Miller</text>
  <text x="88" y="140" font-family="Inter,sans-serif" font-size="10" fill="#3b5068">+1 (905) 555-0147</text>
  <text x="88" y="156" font-family="Inter,sans-serif" font-size="9" fill="#2d9fd9">Ringing — 0:08</text>
  <rect x="212" y="118" width="58" height="22" rx="6" fill="#2d9fd9"/>
  <text x="222" y="133" font-family="Inter,sans-serif" font-size="9" font-weight="600" fill="#ffffff">Answer</text>

  <!-- Queue item 2 — waiting -->
  <rect x="52" y="180" width="230" height="70" rx="10" fill="#f8fafc" filter="url(#rCardShadow)"/>
  <circle cx="74" cy="208" r="6" fill="#ffbd2e"/>
  <text x="88" y="204" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#0a2847">Anne Richardson</text>
  <text x="88" y="220" font-family="Inter,sans-serif" font-size="10" fill="#3b5068">+1 (647) 555-0283</text>
  <text x="88" y="236" font-family="Inter,sans-serif" font-size="9" fill="#ffbd2e">On Hold — 1:22</text>
  <rect x="212" y="198" width="58" height="22" rx="6" fill="#ffffff" stroke="#2d9fd9" stroke-width="1"/>
  <text x="220" y="213" font-family="Inter,sans-serif" font-size="9" font-weight="600" fill="#2d9fd9">Pick Up</text>

  <!-- Queue item 3 — waiting -->
  <rect x="52" y="260" width="230" height="70" rx="10" fill="#f8fafc" filter="url(#rCardShadow)"/>
  <circle cx="74" cy="288" r="6" fill="#ffbd2e"/>
  <text x="88" y="284" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#0a2847">Tom Walsh</text>
  <text x="88" y="300" font-family="Inter,sans-serif" font-size="10" fill="#3b5068">+1 (416) 555-0391</text>
  <text x="88" y="316" font-family="Inter,sans-serif" font-size="9" fill="#ffbd2e">On Hold — 0:45</text>
  <rect x="212" y="278" width="58" height="22" rx="6" fill="#ffffff" stroke="#2d9fd9" stroke-width="1"/>
  <text x="220" y="293" font-family="Inter,sans-serif" font-size="9" font-weight="600" fill="#2d9fd9">Pick Up</text>

  <!-- Queue stats -->
  <rect x="52" y="348" width="230" height="36" rx="8" fill="#d4ecf7"/>
  <text x="102" y="371" font-family="Inter,sans-serif" font-size="10" font-weight="600" fill="#1a6aad">3 calls in queue — Avg wait: 0:52</text>

  <!-- === CENTRE: Active Call === -->
  <rect x="305" y="90" width="270" height="300" rx="12" fill="#eef6fb" filter="url(#rCardShadow)" stroke="#2d9fd9" stroke-width="1"/>
  <text x="325" y="116" font-family="Inter,sans-serif" font-size="10" font-weight="600" fill="#2d9fd9" letter-spacing="1">ACTIVE CALL</text>
  <circle cx="440" cy="168" r="32" fill="#d4ecf7"/>
  <text x="425" y="175" font-family="Inter,sans-serif" font-size="20" fill="#1a6aad">DM</text>
  <text x="370" y="218" font-family="Inter,sans-serif" font-size="16" font-weight="700" fill="#0a2847" text-anchor="middle">David Miller</text>
  <text x="370" y="238" font-family="Inter,sans-serif" font-size="12" fill="#3b5068" text-anchor="middle">ABC Insurance Corp</text>
  <text x="370" y="258" font-family="Inter,sans-serif" font-size="20" font-weight="600" fill="#0a2847" text-anchor="middle">02:14</text>
  <!-- Call controls -->
  <g transform="translate(332, 282)">
    <circle cx="0" cy="0" r="18" fill="#ffffff" stroke="#d4ecf7" stroke-width="1.5"/>
    <text x="-5" y="4" font-family="Inter,sans-serif" font-size="12" fill="#3b5068">🔇</text>
  </g>
  <g transform="translate(382, 282)">
    <circle cx="0" cy="0" r="18" fill="#ffffff" stroke="#d4ecf7" stroke-width="1.5"/>
    <text x="-4" y="5" font-family="Inter,sans-serif" font-size="12" fill="#3b5068">⏸</text>
  </g>
  <g transform="translate(432, 282)">
    <circle cx="0" cy="0" r="18" fill="#ff5f57"/>
    <text x="-5" y="5" font-family="Inter,sans-serif" font-size="12" fill="#ffffff">✕</text>
  </g>
  <!-- Caller notes area -->
  <rect x="318" y="316" width="244" height="56" rx="6" fill="#ffffff"/>
  <text x="330" y="334" font-family="Inter,sans-serif" font-size="9" font-weight="600" fill="#3b5068">CALL NOTES</text>
  <rect x="330" y="342" width="220" height="8" rx="2" fill="#e2e8f0"/>
  <rect x="330" y="356" width="180" height="8" rx="2" fill="#e2e8f0"/>

  <!-- Arrow from active to transfer zone -->
  <line x1="580" y1="240" x2="610" y2="240" stroke="#2d9fd9" stroke-width="2" stroke-dasharray="5,4"/>
  <polygon points="610,234 624,240 610,246" fill="#2d9fd9"/>

  <!-- === RIGHT COLUMN: Transfer Zone === -->
  <text x="640" y="90" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#0a2847">Transfer To</text>
  <rect x="630" y="100" width="230" height="340" rx="10" fill="#f8fafc" stroke="#d4ecf7" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Team member 1 -->
  <rect x="644" y="114" width="202" height="54" rx="8" fill="#ffffff" filter="url(#rCardShadow)"/>
  <circle cx="666" cy="141" r="12" fill="#eef6fb"/>
  <text x="660" y="145" font-family="Inter,sans-serif" font-size="10" fill="#1a6aad">JD</text>
  <circle cx="675" cy="149" r="4.5" fill="#27c93f" stroke="#ffffff" stroke-width="1.5"/>
  <text x="686" y="137" font-family="Inter,sans-serif" font-size="11" font-weight="500" fill="#0a2847">James Donovan</text>
  <text x="686" y="152" font-family="Inter,sans-serif" font-size="9" fill="#3b5068">Personal Lines — Ext. 201</text>

  <!-- Team member 2 -->
  <rect x="644" y="178" width="202" height="54" rx="8" fill="#ffffff" filter="url(#rCardShadow)"/>
  <circle cx="666" cy="205" r="12" fill="#eef6fb"/>
  <text x="660" y="209" font-family="Inter,sans-serif" font-size="10" fill="#1a6aad">KP</text>
  <circle cx="675" cy="213" r="4.5" fill="#27c93f" stroke="#ffffff" stroke-width="1.5"/>
  <text x="686" y="201" font-family="Inter,sans-serif" font-size="11" font-weight="500" fill="#0a2847">Karen Patel</text>
  <text x="686" y="216" font-family="Inter,sans-serif" font-size="9" fill="#3b5068">Commercial Lines — Ext. 204</text>

  <!-- Team member 3 -->
  <rect x="644" y="242" width="202" height="54" rx="8" fill="#ffffff" filter="url(#rCardShadow)"/>
  <circle cx="666" cy="269" r="12" fill="#eef6fb"/>
  <text x="661" y="273" font-family="Inter,sans-serif" font-size="10" fill="#1a6aad">RT</text>
  <circle cx="675" cy="277" r="4.5" fill="#ffbd2e" stroke="#ffffff" stroke-width="1.5"/>
  <text x="686" y="265" font-family="Inter,sans-serif" font-size="11" font-weight="500" fill="#0a2847">Rachel Torres</text>
  <text x="686" y="280" font-family="Inter,sans-serif" font-size="9" fill="#3b5068">Claims — Ext. 208</text>

  <!-- Team member 4 -->
  <rect x="644" y="306" width="202" height="54" rx="8" fill="#ffffff" filter="url(#rCardShadow)"/>
  <circle cx="666" cy="333" r="12" fill="#eef6fb"/>
  <text x="660" y="337" font-family="Inter,sans-serif" font-size="10" fill="#1a6aad">ML</text>
  <circle cx="675" cy="341" r="4.5" fill="#9ca3af" stroke="#ffffff" stroke-width="1.5"/>
  <text x="686" y="329" font-family="Inter,sans-serif" font-size="11" font-weight="500" fill="#0a2847">Michael Lee</text>
  <text x="686" y="344" font-family="Inter,sans-serif" font-size="9" fill="#3b5068">Operations — Ext. 210</text>

  <!-- Drop hint -->
  <rect x="644" y="376" width="202" height="48" rx="8" fill="#d4ecf7" opacity="0.5"/>
  <text x="690" y="405" font-family="Inter,sans-serif" font-size="10" font-weight="500" fill="#1a6aad">⇣ Drag call here</text>
</svg>