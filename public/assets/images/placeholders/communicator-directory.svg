<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <defs>
    <filter id="panelShadow" x="-5%" y="-3%" width="110%" height="110%">
      <feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#0a2847" flood-opacity="0.18"/>
    </filter>
    <filter id="cardShadow" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0a2847" flood-opacity="0.08"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="600" height="500" rx="0" fill="#eef6fb"/>

  <!-- Panel -->
  <rect x="60" y="20" width="480" height="460" rx="14" fill="#ffffff" filter="url(#panelShadow)"/>
  <!-- Header -->
  <rect x="60" y="20" width="480" height="52" rx="14" fill="#2d9fd9"/>
  <rect x="60" y="58" width="480" height="14" fill="#2d9fd9"/>
  <text x="90" y="52" font-family="Inter,sans-serif" font-size="15" font-weight="700" fill="#ffffff">Directory</text>
  <text x="500" y="52" font-family="Inter,sans-serif" font-size="12" fill="#d4ecf7">⚙</text>

  <!-- Search bar -->
  <rect x="80" y="88" width="440" height="36" rx="8" fill="#eef6fb" stroke="#d4ecf7" stroke-width="1"/>
  <text x="100" y="111" font-family="Inter,sans-serif" font-size="12" fill="#3b5068" opacity="0.6">🔍  Search colleagues…</text>

  <!-- Contact Row 1 -->
  <rect x="80" y="138" width="440" height="52" rx="8" fill="#ffffff" filter="url(#cardShadow)"/>
  <circle cx="108" cy="164" r="12" fill="#eef6fb"/>
  <text x="102" y="168" font-family="Inter,sans-serif" font-size="12" fill="#1a6aad">JD</text>
  <circle cx="117" cy="172" r="5" fill="#27c93f" stroke="#ffffff" stroke-width="1.5"/>
  <text x="130" y="160" font-family="Inter,sans-serif" font-size="13" font-weight="500" fill="#0a2847">James Donovan</text>
  <text x="130" y="175" font-family="Inter,sans-serif" font-size="10" fill="#3b5068">Personal Lines — Ext. 201</text>
  <text x="468" y="168" font-family="Inter,sans-serif" font-size="10" fill="#2d9fd9" font-weight="600">Available</text>

  <!-- Contact Row 2 -->
  <rect x="80" y="198" width="440" height="52" rx="8" fill="#f8fafc" filter="url(#cardShadow)"/>
  <circle cx="108" cy="224" r="12" fill="#eef6fb"/>
  <text x="102" y="228" font-family="Inter,sans-serif" font-size="12" fill="#1a6aad">KP</text>
  <circle cx="117" cy="232" r="5" fill="#27c93f" stroke="#ffffff" stroke-width="1.5"/>
  <text x="130" y="220" font-family="Inter,sans-serif" font-size="13" font-weight="500" fill="#0a2847">Karen Patel</text>
  <text x="130" y="235" font-family="Inter,sans-serif" font-size="10" fill="#3b5068">Commercial Lines — Ext. 204</text>
  <text x="468" y="228" font-family="Inter,sans-serif" font-size="10" fill="#2d9fd9" font-weight="600">Available</text>

  <!-- Contact Row 3 -->
  <rect x="80" y="258" width="440" height="52" rx="8" fill="#ffffff" filter="url(#cardShadow)"/>
  <circle cx="108" cy="284" r="12" fill="#eef6fb"/>
  <text x="103" y="288" font-family="Inter,sans-serif" font-size="12" fill="#1a6aad">RT</text>
  <circle cx="117" cy="292" r="5" fill="#ffbd2e" stroke="#ffffff" stroke-width="1.5"/>
  <text x="130" y="280" font-family="Inter,sans-serif" font-size="13" font-weight="500" fill="#0a2847">Rachel Torres</text>
  <text x="130" y="295" font-family="Inter,sans-serif" font-size="10" fill="#3b5068">Claims — Ext. 208</text>
  <text x="484" y="288" font-family="Inter,sans-serif" font-size="10" fill="#ffbd2e" font-weight="600">Busy</text>

  <!-- Contact Row 4 -->
  <rect x="80" y="318" width="440" height="52" rx="8" fill="#f8fafc" filter="url(#cardShadow)"/>
  <circle cx="108" cy="344" r="12" fill="#eef6fb"/>
  <text x="101" y="348" font-family="Inter,sans-serif" font-size="12" fill="#1a6aad">ML</text>
  <circle cx="117" cy="352" r="5" fill="#27c93f" stroke="#ffffff" stroke-width="1.5"/>
  <text x="130" y="340" font-family="Inter,sans-serif" font-size="13" font-weight="500" fill="#0a2847">Michael Lee</text>
  <text x="130" y="355" font-family="Inter,sans-serif" font-size="10" fill="#3b5068">Operations — Ext. 210</text>
  <text x="468" y="348" font-family="Inter,sans-serif" font-size="10" fill="#2d9fd9" font-weight="600">Available</text>

  <!-- Contact Row 5 -->
  <rect x="80" y="378" width="440" height="52" rx="8" fill="#ffffff" filter="url(#cardShadow)"/>
  <circle cx="108" cy="404" r="12" fill="#eef6fb"/>
  <text x="103" y="408" font-family="Inter,sans-serif" font-size="12" fill="#1a6aad">SB</text>
  <circle cx="117" cy="412" r="5" fill="#9ca3af" stroke="#ffffff" stroke-width="1.5"/>
  <text x="130" y="400" font-family="Inter,sans-serif" font-size="13" font-weight="500" fill="#0a2847">Sandra Brown</text>
  <text x="130" y="415" font-family="Inter,sans-serif" font-size="10" fill="#3b5068">Renewals — Ext. 215</text>
  <text x="478" y="408" font-family="Inter,sans-serif" font-size="10" fill="#9ca3af" font-weight="600">Offline</text>

  <!-- Transfer Drop Zone -->
  <rect x="80" y="444" width="440" height="28" rx="8" fill="#d4ecf7" stroke="#2d9fd9" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="220" y="463" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#1a6aad">⇣  Drop here to transfer call</text>
</svg>