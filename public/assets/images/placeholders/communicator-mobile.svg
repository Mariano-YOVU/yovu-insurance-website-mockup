<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 700" width="360" height="700">
  <defs>
    <filter id="phoneShadow" x="-8%" y="-4%" width="116%" height="108%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#0a2847" flood-opacity="0.25"/>
    </filter>
    <filter id="btnGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#ff5f57" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="360" height="700" fill="#eef6fb"/>

  <!-- Phone frame -->
  <rect x="40" y="30" width="280" height="640" rx="36" fill="#0a2847" filter="url(#phoneShadow)"/>
  <!-- Screen -->
  <rect x="48" y="50" width="264" height="600" rx="28" fill="#ffffff"/>

  <!-- Status bar -->
  <rect x="48" y="50" width="264" height="36" rx="28" fill="#0a2847"/>
  <rect x="48" y="72" width="264" height="14" fill="#0a2847"/>
  <!-- Notch -->
  <rect x="130" y="50" width="100" height="24" rx="12" fill="#0a2847"/>
  <circle cx="180" cy="62" r="6" fill="#1a3a5c"/>
  <!-- Time -->
  <text x="72" y="70" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#ffffff">9:41</text>
  <!-- Signal/battery -->
  <text x="276" y="70" font-family="Inter,sans-serif" font-size="10" fill="#ffffff">●●●○</text>

  <!-- YOVU header -->
  <rect x="48" y="86" width="264" height="48" fill="#2d9fd9"/>
  <text x="140" y="116" font-family="Inter,sans-serif" font-size="16" font-weight="700" fill="#ffffff">YOVU</text>
  <text x="268" y="116" font-family="Inter,sans-serif" font-size="14" fill="#d4ecf7">⋮</text>

  <!-- Active call indicator -->
  <rect x="68" y="154" width="224" height="28" rx="14" fill="#dcfce7"/>
  <circle cx="86" cy="168" r="5" fill="#27c93f">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="98" y="172" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#16a34a">Active Call</text>

  <!-- Avatar circle -->
  <circle cx="180" cy="260" r="50" fill="#d4ecf7"/>
  <text x="156" y="270" font-family="Inter,sans-serif" font-size="28" fill="#1a6aad">DM</text>

  <!-- Caller info -->
  <text x="180" y="336" font-family="Inter,sans-serif" font-size="18" font-weight="700" fill="#0a2847" text-anchor="middle">David Miller</text>
  <text x="180" y="358" font-family="Inter,sans-serif" font-size="13" fill="#3b5068" text-anchor="middle">ABC Insurance Corp</text>
  <text x="180" y="378" font-family="Inter,sans-serif" font-size="11" fill="#3b5068" text-anchor="middle">+1 (905) 555-0147</text>

  <!-- Duration -->
  <text x="180" y="420" font-family="Inter,sans-serif" font-size="36" font-weight="600" fill="#0a2847" text-anchor="middle">02:34</text>

  <!-- Control buttons row 1 -->
  <g transform="translate(88, 470)">
    <circle cx="0" cy="0" r="28" fill="#eef6fb" stroke="#d4ecf7" stroke-width="1.5"/>
    <text x="-6" y="2" font-family="Inter,sans-serif" font-size="16" fill="#3b5068">🔇</text>
    <text x="-12" y="40" font-family="Inter,sans-serif" font-size="9" fill="#3b5068">Mute</text>
  </g>
  <g transform="translate(180, 470)">
    <circle cx="0" cy="0" r="28" fill="#eef6fb" stroke="#d4ecf7" stroke-width="1.5"/>
    <text x="-5" y="4" font-family="Inter,sans-serif" font-size="16" fill="#3b5068">⏸</text>
    <text x="-10" y="40" font-family="Inter,sans-serif" font-size="9" fill="#3b5068">Hold</text>
  </g>
  <g transform="translate(272, 470)">
    <circle cx="0" cy="0" r="28" fill="#eef6fb" stroke="#d4ecf7" stroke-width="1.5"/>
    <text x="-6" y="4" font-family="Inter,sans-serif" font-size="16" fill="#3b5068">🔊</text>
    <text x="-16" y="40" font-family="Inter,sans-serif" font-size="9" fill="#3b5068">Speaker</text>
  </g>

  <!-- Control buttons row 2 -->
  <g transform="translate(88, 556)">
    <circle cx="0" cy="0" r="28" fill="#eef6fb" stroke="#d4ecf7" stroke-width="1.5"/>
    <text x="-6" y="4" font-family="Inter,sans-serif" font-size="14" fill="#2d9fd9">⇄</text>
    <text x="-16" y="40" font-family="Inter,sans-serif" font-size="9" fill="#3b5068">Transfer</text>
  </g>
  <g transform="translate(180, 556)">
    <circle cx="0" cy="0" r="32" fill="#ff5f57" filter="url(#btnGlow)"/>
    <text x="-6" y="5" font-family="Inter,sans-serif" font-size="18" fill="#ffffff">✕</text>
    <text x="-16" y="46" font-family="Inter,sans-serif" font-size="9" fill="#3b5068">End Call</text>
  </g>
  <g transform="translate(272, 556)">
    <circle cx="0" cy="0" r="28" fill="#eef6fb" stroke="#d4ecf7" stroke-width="1.5"/>
    <text x="-5" y="4" font-family="Inter,sans-serif" font-size="14" fill="#2d9fd9">⊞</text>
    <text x="-14" y="40" font-family="Inter,sans-serif" font-size="9" fill="#3b5068">Keypad</text>
  </g>

  <!-- Bottom home bar -->
  <rect x="140" y="634" width="80" height="5" rx="2.5" fill="#0a2847" opacity="0.3"/>
</svg>