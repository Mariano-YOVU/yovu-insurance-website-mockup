<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <defs>
    <filter id="shadow1" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#0a2847" flood-opacity="0.15"/>
    </filter>
    <filter id="shadowSm" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#0a2847" flood-opacity="0.12"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="700" rx="12" fill="#eef6fb"/>

  <!-- Applied Epic Browser Window -->
  <rect x="40" y="30" width="780" height="640" rx="10" fill="#ffffff" filter="url(#shadow1)"/>
  <!-- Title bar -->
  <rect x="40" y="30" width="780" height="44" rx="10" fill="#e2e8f0"/>
  <rect x="40" y="64" width="780" height="10" fill="#e2e8f0"/>
  <!-- Traffic lights -->
  <circle cx="64" cy="52" r="6" fill="#ff5f57"/>
  <circle cx="84" cy="52" r="6" fill="#ffbd2e"/>
  <circle cx="104" cy="52" r="6" fill="#27c93f"/>
  <!-- URL bar -->
  <rect x="140" y="42" width="400" height="22" rx="4" fill="#ffffff"/>
  <text x="160" y="57" font-family="Inter,sans-serif" font-size="11" fill="#3b5068">appliedepic.cloud/policies</text>

  <!-- Sidebar -->
  <rect x="40" y="74" width="180" height="596" fill="#0a2847"/>
  <text x="60" y="105" font-family="Inter,sans-serif" font-size="13" font-weight="600" fill="#7bc4e8">Applied Epic</text>
  <!-- Sidebar items -->
  <rect x="52" y="125" width="156" height="32" rx="6" fill="#1a6aad" opacity="0.6"/>
  <text x="68" y="146" font-family="Inter,sans-serif" font-size="11" fill="#ffffff">Dashboard</text>
  <rect x="52" y="165" width="156" height="32" rx="6" fill="#1a6aad"/>
  <text x="68" y="186" font-family="Inter,sans-serif" font-size="11" fill="#ffffff">Policies</text>
  <rect x="52" y="205" width="156" height="32" rx="6" fill="#1a6aad" opacity="0.6"/>
  <text x="68" y="226" font-family="Inter,sans-serif" font-size="11" fill="#ffffff">Claims</text>
  <rect x="52" y="245" width="156" height="32" rx="6" fill="#1a6aad" opacity="0.6"/>
  <text x="68" y="266" font-family="Inter,sans-serif" font-size="11" fill="#ffffff">Contacts</text>
  <rect x="52" y="285" width="156" height="32" rx="6" fill="#1a6aad" opacity="0.6"/>
  <text x="68" y="306" font-family="Inter,sans-serif" font-size="11" fill="#ffffff">Reports</text>

  <!-- Main content area -->
  <rect x="230" y="84" width="580" height="36" rx="0" fill="#f8fafc"/>
  <text x="250" y="108" font-family="Inter,sans-serif" font-size="13" font-weight="600" fill="#0a2847">Policy Detail — Sarah Johnson — POL-2024-8834</text>
  <!-- Content lines -->
  <rect x="245" y="136" width="260" height="12" rx="3" fill="#d4ecf7"/>
  <rect x="245" y="160" width="340" height="12" rx="3" fill="#e2e8f0"/>
  <rect x="245" y="184" width="300" height="12" rx="3" fill="#e2e8f0"/>
  <rect x="245" y="208" width="280" height="12" rx="3" fill="#e2e8f0"/>
  <!-- Table header -->
  <rect x="245" y="245" width="540" height="28" rx="4" fill="#eef6fb"/>
  <text x="260" y="264" font-family="Inter,sans-serif" font-size="10" font-weight="600" fill="#0a2847">Coverage</text>
  <text x="400" y="264" font-family="Inter,sans-serif" font-size="10" font-weight="600" fill="#0a2847">Effective</text>
  <text x="520" y="264" font-family="Inter,sans-serif" font-size="10" font-weight="600" fill="#0a2847">Premium</text>
  <text x="650" y="264" font-family="Inter,sans-serif" font-size="10" font-weight="600" fill="#0a2847">Status</text>
  <!-- Table rows -->
  <rect x="245" y="279" width="540" height="26" rx="0" fill="#ffffff"/>
  <rect x="245" y="305" width="540" height="1" fill="#e2e8f0"/>
  <rect x="245" y="306" width="540" height="26" rx="0" fill="#f8fafc"/>
  <rect x="245" y="332" width="540" height="1" fill="#e2e8f0"/>
  <rect x="245" y="333" width="540" height="26" rx="0" fill="#ffffff"/>

  <!-- YOVU Communicator Panel -->
  <rect x="850" y="50" width="320" height="620" rx="12" fill="#ffffff" filter="url(#shadow1)"/>
  <!-- Communicator header -->
  <rect x="850" y="50" width="320" height="56" rx="12" fill="#2d9fd9"/>
  <rect x="850" y="90" width="320" height="16" fill="#2d9fd9"/>
  <text x="878" y="84" font-family="Inter,sans-serif" font-size="14" font-weight="700" fill="#ffffff">YOVU Communicator</text>
  <circle cx="1142" cy="78" r="10" fill="#1a6aad"/>
  <text x="1138" y="82" font-family="Inter,sans-serif" font-size="12" fill="#ffffff">×</text>

  <!-- Screen Pop Section -->
  <rect x="866" y="120" width="288" height="100" rx="8" fill="#eef6fb" filter="url(#shadowSm)"/>
  <text x="882" y="142" font-family="Inter,sans-serif" font-size="10" font-weight="600" fill="#2d9fd9" text-transform="uppercase" letter-spacing="1">INCOMING CALL</text>
  <text x="882" y="164" font-family="Inter,sans-serif" font-size="16" font-weight="700" fill="#0a2847">Sarah Johnson</text>
  <text x="882" y="183" font-family="Inter,sans-serif" font-size="12" fill="#3b5068">+1 (416) 555-0192</text>
  <text x="882" y="200" font-family="Inter,sans-serif" font-size="10" fill="#3b5068">ABC Insurance Corp — Policy Holder</text>

  <!-- Call Control Buttons -->
  <g transform="translate(922, 235)">
    <circle cx="0" cy="0" r="22" fill="#27c93f"/>
    <text x="-5" y="5" font-family="Inter,sans-serif" font-size="16" fill="#ffffff">✆</text>
    <text x="-12" y="36" font-family="Inter,sans-serif" font-size="9" fill="#3b5068">Answer</text>
  </g>
  <g transform="translate(1000, 235)">
    <circle cx="0" cy="0" r="22" fill="#ffbd2e"/>
    <text x="-4" y="5" font-family="Inter,sans-serif" font-size="14" fill="#ffffff">⏸</text>
    <text x="-8" y="36" font-family="Inter,sans-serif" font-size="9" fill="#3b5068">Hold</text>
  </g>
  <g transform="translate(1078, 235)">
    <circle cx="0" cy="0" r="22" fill="#2d9fd9"/>
    <text x="-6" y="5" font-family="Inter,sans-serif" font-size="14" fill="#ffffff">⇄</text>
    <text x="-16" y="36" font-family="Inter,sans-serif" font-size="9" fill="#3b5068">Transfer</text>
  </g>

  <!-- Divider -->
  <rect x="866" y="285" width="288" height="1" fill="#d4ecf7"/>

  <!-- Call History Label -->
  <text x="882" y="310" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#0a2847">Recent Call History</text>

  <!-- Call History Rows -->
  <rect x="866" y="320" width="288" height="50" rx="6" fill="#f8fafc"/>
  <circle cx="886" cy="345" r="8" fill="#d4ecf7"/>
  <text x="882" y="349" font-family="Inter,sans-serif" font-size="10" fill="#2d9fd9">↙</text>
  <text x="902" y="340" font-family="Inter,sans-serif" font-size="11" font-weight="500" fill="#0a2847">Sarah Johnson</text>
  <text x="902" y="356" font-family="Inter,sans-serif" font-size="10" fill="#3b5068">Today, 2:15 PM — 4m 32s</text>

  <rect x="866" y="376" width="288" height="50" rx="6" fill="#ffffff"/>
  <circle cx="886" cy="401" r="8" fill="#d4ecf7"/>
  <text x="882" y="405" font-family="Inter,sans-serif" font-size="10" fill="#27c93f">↗</text>
  <text x="902" y="396" font-family="Inter,sans-serif" font-size="11" font-weight="500" fill="#0a2847">Mark Thompson</text>
  <text x="902" y="412" font-family="Inter,sans-serif" font-size="10" fill="#3b5068">Today, 1:40 PM — 2m 18s</text>

  <rect x="866" y="432" width="288" height="50" rx="6" fill="#f8fafc"/>
  <circle cx="886" cy="457" r="8" fill="#d4ecf7"/>
  <text x="882" y="461" font-family="Inter,sans-serif" font-size="10" fill="#2d9fd9">↙</text>
  <text x="902" y="452" font-family="Inter,sans-serif" font-size="11" font-weight="500" fill="#0a2847">Lisa Chen</text>
  <text x="902" y="468" font-family="Inter,sans-serif" font-size="10" fill="#3b5068">Yesterday, 4:05 PM — 6m 11s</text>

  <!-- Divider -->
  <rect x="866" y="498" width="288" height="1" fill="#d4ecf7"/>

  <!-- Activity Log Label -->
  <text x="882" y="522" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#0a2847">Activity Log</text>
  <rect x="866" y="532" width="288" height="12" rx="3" fill="#e2e8f0"/>
  <rect x="866" y="552" width="240" height="12" rx="3" fill="#e2e8f0"/>
  <rect x="866" y="572" width="260" height="12" rx="3" fill="#e2e8f0"/>
  <rect x="866" y="592" width="200" height="12" rx="3" fill="#e2e8f0"/>

  <!-- Auto-logged badge -->
  <rect x="866" y="618" width="130" height="24" rx="12" fill="#d4ecf7"/>
  <text x="882" y="634" font-family="Inter,sans-serif" font-size="10" font-weight="600" fill="#1a6aad">✓ Auto-logged to Epic</text>

  <!-- Annotation Labels -->
  <!-- Screen Pop label -->
  <line x1="830" y1="155" x2="860" y2="155" stroke="#2d9fd9" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="710" y="142" width="116" height="26" rx="13" fill="#2d9fd9"/>
  <text x="736" y="159" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#ffffff">Screen Pop</text>

  <!-- Call History label -->
  <line x1="830" y1="370" x2="860" y2="370" stroke="#2d9fd9" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="710" y="357" width="116" height="26" rx="13" fill="#2d9fd9"/>
  <text x="736" y="374" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#ffffff">Call History</text>

  <!-- Activity Log label -->
  <line x1="830" y1="555" x2="860" y2="555" stroke="#2d9fd9" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="710" y="542" width="116" height="26" rx="13" fill="#2d9fd9"/>
  <text x="734" y="559" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#ffffff">Activity Log</text>
</svg>