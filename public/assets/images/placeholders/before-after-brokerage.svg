<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" width="1000" height="450">
  <rect width="1000" height="450" fill="#f7f9fb" rx="12"/>

  <!-- Left: Before -->
  <g>
    <rect x="30" y="20" width="460" height="410" rx="14" fill="#f0f0f0" stroke="#d4dde6" stroke-width="1"/>
    <rect x="30" y="20" width="460" height="44" rx="14" fill="#e2e2e2"/>
    <rect x="30" y="52" width="460" height="12" fill="#e2e2e2"/>
    <text x="260" y="48" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="700" fill="#6b8299">BEFORE — Fragmented Workflow</text>

    <!-- Scattered disconnected elements -->
    <rect x="60" y="90" width="120" height="70" rx="10" fill="#ffffff" stroke="#d4dde6" stroke-width="1"/>
    <text x="120" y="120" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="22">📞</text>
    <text x="120" y="148" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#6b8299">Phone system</text>

    <rect x="200" y="90" width="120" height="70" rx="10" fill="#ffffff" stroke="#d4dde6" stroke-width="1"/>
    <text x="260" y="120" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="22">📝</text>
    <text x="260" y="148" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#6b8299">Manual notes</text>

    <rect x="340" y="90" width="120" height="70" rx="10" fill="#ffffff" stroke="#d4dde6" stroke-width="1"/>
    <text x="400" y="120" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="22">📧</text>
    <text x="400" y="148" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#6b8299">Email threads</text>

    <rect x="100" y="190" width="120" height="70" rx="10" fill="#ffffff" stroke="#d4dde6" stroke-width="1"/>
    <text x="160" y="220" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="22">📊</text>
    <text x="160" y="248" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#6b8299">Spreadsheets</text>

    <rect x="280" y="190" width="120" height="70" rx="10" fill="#ffffff" stroke="#d4dde6" stroke-width="1"/>
    <text x="340" y="220" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="22">💬</text>
    <text x="340" y="248" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#6b8299">Sticky notes</text>

    <!-- X marks showing disconnection -->
    <text x="185" y="120" font-family="Inter,system-ui,sans-serif" font-size="18" fill="#ff5f57" font-weight="700">✕</text>
    <text x="325" y="120" font-family="Inter,system-ui,sans-serif" font-size="18" fill="#ff5f57" font-weight="700">✕</text>
    <text x="240" y="220" font-family="Inter,system-ui,sans-serif" font-size="18" fill="#ff5f57" font-weight="700">✕</text>

    <!-- Pain points -->
    <g font-family="Inter,system-ui,sans-serif" font-size="11">
      <rect x="60" y="290" width="400" height="28" rx="6" fill="#fff0f0" stroke="#ffcccc" stroke-width="1"/>
      <text x="80" y="309" fill="#cc3333">✕  Manual lookup wastes time on every call</text>
      <rect x="60" y="326" width="400" height="28" rx="6" fill="#fff0f0" stroke="#ffcccc" stroke-width="1"/>
      <text x="80" y="345" fill="#cc3333">✕  Notes lost between team members</text>
      <rect x="60" y="362" width="400" height="28" rx="6" fill="#fff0f0" stroke="#ffcccc" stroke-width="1"/>
      <text x="80" y="381" fill="#cc3333">✕  No recordings, no audit trail</text>
      <rect x="60" y="398" width="400" height="28" rx="6" fill="#fff0f0" stroke="#ffcccc" stroke-width="1"/>
      <text x="80" y="417" fill="#cc3333">✕  Weak E&amp;O documentation</text>
    </g>
  </g>

  <!-- Right: After -->
  <g>
    <rect x="510" y="20" width="460" height="410" rx="14" fill="#eef6fb" stroke="#2d9fd9" stroke-width="2"/>
    <rect x="510" y="20" width="460" height="44" rx="14" fill="#0a2847"/>
    <rect x="510" y="52" width="460" height="12" fill="#0a2847"/>
    <text x="740" y="48" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="700" fill="#ffffff">WITH YOVU — Connected Workflow</text>

    <!-- Central Communicator -->
    <rect x="660" y="90" width="160" height="80" rx="12" fill="#0a2847" stroke="#2d9fd9" stroke-width="2"/>
    <text x="740" y="122" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700" fill="#ffffff">YOVU</text>
    <text x="740" y="140" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#7bc4e8">Communicator</text>
    <text x="740" y="158" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.6)">One workspace</text>

    <!-- Connected elements -->
    <line x1="660" y1="130" x2="600" y2="130" stroke="#2d9fd9" stroke-width="1.5"/>
    <rect x="540" y="104" width="60" height="52" rx="8" fill="#ffffff" stroke="#d4ecf7" stroke-width="1"/>
    <text x="570" y="128" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="14">📞</text>
    <text x="570" y="148" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#3b5068">Calls</text>

    <line x1="820" y1="130" x2="880" y2="130" stroke="#2d9fd9" stroke-width="1.5"/>
    <rect x="880" y="104" width="60" height="52" rx="8" fill="#ffffff" stroke="#d4ecf7" stroke-width="1"/>
    <text x="910" y="128" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="14">📊</text>
    <text x="910" y="148" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#3b5068">Epic</text>

    <line x1="740" y1="170" x2="740" y2="200" stroke="#2d9fd9" stroke-width="1.5"/>

    <!-- Bottom connected items -->
    <rect x="570" y="200" width="80" height="52" rx="8" fill="#ffffff" stroke="#d4ecf7" stroke-width="1"/>
    <text x="610" y="224" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="14">🎙️</text>
    <text x="610" y="244" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#3b5068">Recordings</text>

    <line x1="650" y1="226" x2="700" y2="226" stroke="#2d9fd9" stroke-width="1.5"/>

    <rect x="700" y="200" width="80" height="52" rx="8" fill="#ffffff" stroke="#d4ecf7" stroke-width="1"/>
    <text x="740" y="224" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="14">📱</text>
    <text x="740" y="244" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#3b5068">Mobile</text>

    <line x1="780" y1="226" x2="830" y2="226" stroke="#2d9fd9" stroke-width="1.5"/>

    <rect x="830" y="200" width="80" height="52" rx="8" fill="#ffffff" stroke="#d4ecf7" stroke-width="1"/>
    <text x="870" y="224" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="14">🤖</text>
    <text x="870" y="244" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#3b5068">AI Summary</text>

    <!-- Benefit points -->
    <g font-family="Inter,system-ui,sans-serif" font-size="11">
      <rect x="540" y="290" width="400" height="28" rx="6" fill="#e8f8e8" stroke="#c3ecc3" stroke-width="1"/>
      <text x="560" y="309" fill="#1a8a1a">✓  Instant caller context via screen pop</text>
      <rect x="540" y="326" width="400" height="28" rx="6" fill="#e8f8e8" stroke="#c3ecc3" stroke-width="1"/>
      <text x="560" y="345" fill="#1a8a1a">✓  Auto-logged activity in Applied Epic</text>
      <rect x="540" y="362" width="400" height="28" rx="6" fill="#e8f8e8" stroke="#c3ecc3" stroke-width="1"/>
      <text x="560" y="381" fill="#1a8a1a">✓  7-year recordings with transcripts &amp; AI</text>
      <rect x="540" y="398" width="400" height="28" rx="6" fill="#e8f8e8" stroke="#c3ecc3" stroke-width="1"/>
      <text x="560" y="417" fill="#1a8a1a">✓  Stronger E&amp;O documentation support</text>
    </g>
  </g>
</svg>